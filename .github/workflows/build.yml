name: Build Android APK from ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Unzip and Move Files Safely
        run: |
          unzip android.zip -d extracted_project
          
          # build.gradle ফাইলটি জিপের ঠিক কোন ফোল্ডারে লুকিয়ে আছে তা খুঁজে বের করা
          BG_PATH=$(find extracted_project -name "build.gradle" -print -quit)
          
          if [ -z "$BG_PATH" ]; then
            echo "Error: build.gradle file not found anywhere in the ZIP archive!"
            exit 1
          fi
          
          # যেখানে build.gradle আছে, তার প্যারেন্ট ফোল্ডারটি বের করা (যেমন: app বা android)
          APP_DIR=$(dirname "$BG_PATH")
          echo "Found build.gradle at: $APP_DIR"
          
          # যদি এটি 'app' ফোল্ডার হয়, তবে এর বাইরের মূল অ্যান্ড্রয়েড কনফিগারেশন তৈরি করা
          if [[ "$APP_DIR" == *"app" ]]; then
            PARENT_DIR=$(dirname "$APP_DIR")
            echo "Moving files from parent: $PARENT_DIR"
            mv "$PARENT_DIR"/* . 2>/dev/null || true
            mv "$PARENT_DIR"/.* . 2>/dev/null || true
          else
            mv "$APP_DIR"/* . 2>/dev/null || true
            mv "$APP_DIR"/.* . 2>/dev/null || true
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Generate Android Build Files
        run: |
          # রুট লেভেলে settings.gradle বা build.gradle নিশ্চিত করা
          if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            echo "include ':app'" > settings.gradle
          fi
          
          if [ ! -f "build.gradle" ] && [ ! -f "build.gradle.kts" ]; then
            cat << 'EOF' > build.gradle
            buildscript {
                repositories { google() \n mavenCentral() }
                dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
            }
            allprojects { repositories { google() \n mavenCentral() } }
          EOF
          fi
          
          # ফ্রেশ গ্রেডল র‍্যাপার জেনারেট করা
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
