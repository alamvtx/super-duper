name: Build Android APK from ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip android.zip -d extracted_project
          if [ -d "extracted_project/android" ]; then
            mv extracted_project/* .
          elif [ -d "extracted_project/app" ]; then
            # যদি জিপের ভেতরে সরাসরি অ্যাপ ফাইল থাকে
            mv extracted_project/* android/ 2>/dev/null || mv extracted_project .
          else
            mv extracted_project/* .
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          cd android || cd .
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
