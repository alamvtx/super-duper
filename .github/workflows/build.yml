name: Build Android APK from ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip android.zip -d extracted_project
          
          # জিপ ফাইলের ভেতরের সঠিক রুট ডিরেক্টরি খুঁজে বের করা
          if [ -d "extracted_project/android" ]; then
            mv extracted_project/android/* . 2>/dev/null || true
            mv extracted_project/android/.* . 2>/dev/null || true
          else
            mv extracted_project/* . 2>/dev/null || true
            mv extracted_project/.* . 2>/dev/null || true
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Missing Gradle Files
        run: |
          # যদি প্রজেক্টে gradlew ফাইল না থাকে, তবে নতুন করে জেনারেট করা হবে
          if [ ! -f "gradlew" ]; then
            echo "Gradlew missing. Generating a fresh wrapper..."
            gradle wrapper --gradle-version 8.2
          fi
          
          # যদি রুট লেভেলে settings.gradle না থাকে, তবে সেটি তৈরি করা
          if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            echo "include ':app'" > settings.gradle
          fi
          
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
