name: Build Android APK from ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip android.zip -d extracted_project
          
          # gradlew ফাইলটি ঠিক কোথায় আছে তা খুঁজে বের করা
          GRADLEW_PATH=$(find extracted_project -name "gradlew" -print -quit)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew file not found anywhere in the ZIP archive!"
            exit 1
          fi
          
          # যেখানে gradlew আছে, তার প্যারেন্ট ফোল্ডারটি খুঁজে বের করা
          ANDROID_DIR=$(dirname "$GRADLEW_PATH")
          echo "Found Android root directory at: $ANDROID_DIR"
          
          # ভেতরের সব ফাইল মেইন ডিরেক্টরিতে নিয়ে আসা যেন গিটহাব কাজ করতে পারে
          mv "$ANDROID_DIR"/* . 2>/dev/null || true
          mv "$ANDROID_DIR"/.* . 2>/dev/null || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
